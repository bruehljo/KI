/* ============================================================ ENGINE ============================================================ */
const main=document.getElementById('main');
const progressEl=document.getElementById('progress');
const counterEl=document.getElementById('counter');
const chapterlabelEl=document.getElementById('chapterlabel');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const audioBtn=document.getElementById('audioBtn');
const replayBtn=document.getElementById('replayBtn');
const mapBtn=document.getElementById('mapBtn');
const overlay=document.getElementById('overlay');
const ovchapters=document.getElementById('ovchapters');
let idx=0, typing=false, typeTimer=null, audioOn=false;

/* ---- progress ticks grouped by chapter ---- */
(function buildProgress(){
  let curChap=null, seg=null;
  SLIDES.forEach((s,i)=>{
    if(s.chapter!==curChap){ curChap=s.chapter; seg=document.createElement('div'); seg.className='seg'; progressEl.appendChild(seg); }
    const d=document.createElement('div'); d.className='tick'; d.innerHTML='<i></i>'; d.dataset.i=i;
    d.onclick=()=>{ clearAgent(); stopSpeak(); idx=i; render(); };
    seg.appendChild(d);
  });
})();
const ticks=[...progressEl.querySelectorAll('.tick')];

/* ---- chapter overview overlay ---- */
(function buildOverlay(){
  CHAPTERS.forEach(c=>{
    const firstIdx=SLIDES.findIndex(s=>s.chapter===c.id);
    if(firstIdx<0) return;
    const el=document.createElement('div'); el.className='ovchap'; el.dataset.id=c.id;
    el.innerHTML=`<div class="cn">${c.name}</div><div class="ct">${c.sub||c.name}</div>`;
    el.onclick=()=>{ clearAgent(); stopSpeak(); idx=firstIdx; toggleOverlay(false); render(); };
    ovchapters.appendChild(el);
  });
})();
function toggleOverlay(force){
  const show = force!==undefined ? force : !overlay.classList.contains('show');
  overlay.classList.toggle('show',show);
  if(show){ const cur=SLIDES[idx].chapter; [...ovchapters.children].forEach(el=>el.classList.toggle('cur',el.dataset.id===cur)); }
}
mapBtn.onclick=()=>toggleOverlay();

/* ---- speech ---- */
const synth=window.speechSynthesis;
let voice=null;
function pickVoice(){ if(!synth)return; const vs=synth.getVoices(); voice=vs.find(v=>/de[-_]DE/i.test(v.lang))||vs.find(v=>/^de/i.test(v.lang))||null; }
if(synth){ pickVoice(); synth.onvoiceschanged=pickVoice; }
function ttsClean(html){
  let t=html.replace(/<[^>]+>/g,'');
  t=t.replace(/→/g,' ergibt ').replace(/↺/g,' wiederholen ').replace(/—/g,', ').replace(/…/g,' ').replace(/⊃/g,' enthält ');
  t=t.replace(/z\.\s?B\./g,'zum Beispiel').replace(/u\.\s?a\./g,'unter anderem').replace(/d\.\s?h\./g,'das heißt');
  t=t.replace(/Mrd\./g,'Milliarden').replace(/Abs\./g,'Absatz').replace(/Art\./g,'Artikel');
  t=t.replace(/x₁/g,'x eins').replace(/x₂/g,'x zwei').replace(/x₃/g,'x drei').replace(/w₁/g,'w eins').replace(/w₂/g,'w zwei').replace(/w₃/g,'w drei');
  t=t.replace(/[„“”]/g,'');
  t=t.replace(/\s+/g,' ').trim();
  return t;
}
let resumeTimer=null;
function stopSpeak(){ if(!synth)return; synth.cancel(); if(resumeTimer){clearInterval(resumeTimer);resumeTimer=null;} setTalking(false); }
function speak(text){
  if(!synth||!audioOn)return;
  stopSpeak();
  const clean=ttsClean(text);
  const parts=clean.match(/[^.!?]+[.!?]*/g)||[clean];
  let i=0; setTalking(true);
  resumeTimer=setInterval(()=>{ if(synth.speaking) synth.resume(); },9000);
  (function nextPart(){
    if(i>=parts.length){ setTalking(false); if(resumeTimer){clearInterval(resumeTimer);resumeTimer=null;} agentSpeakingDone(); return; }
    const u=new SpeechSynthesisUtterance(parts[i].trim());
    u.lang='de-DE'; if(voice)u.voice=voice; u.rate=1.0; u.pitch=1.06;
    u.onend=()=>{i++;nextPart();}; u.onerror=()=>{i++;nextPart();};
    synth.speak(u);
  })();
}
function setTalking(on){ const bot=document.getElementById('bot'); if(bot)bot.classList.toggle('talking',on); const sp=document.querySelector('.speech'); if(sp)sp.classList.toggle('spk-on',on); }

/* ---- agent status orchestration ---- */
let agentTimers=[];
function clearAgent(){ agentTimers.forEach(t=>clearTimeout(t)); agentTimers=[]; }
function setStatus(text,busy){ const row=document.getElementById('statusrow'); const t=document.getElementById('statustext'); if(!row||!t)return; t.textContent=text; row.classList.toggle('idle',!busy); }
function setTool(name,state){ document.querySelectorAll('#toolchips .toolchip').forEach(c=>{ if(name==='reset'){c.classList.remove('active','done');return;} if(c.dataset.tool===name){c.classList.remove('active','done');if(state)c.classList.add(state);} }); }
function animateViz(){
  const viz=document.querySelector('.viz'); if(!viz)return;
  const group=viz.querySelector('.row,.flow,.learnlist,.pyr,.tags,.map,.traintable,.axes')||viz;
  const kids=[...group.children];
  kids.forEach((k,n)=>{ k.style.opacity='0'; k.style.transform='translateY(10px)'; k.style.transition='opacity .5s, transform .5s'; setTimeout(()=>{k.style.opacity='';k.style.transform='';}, 60+n*90); });
}
function runAgentSequence(isContent, done){
  clearAgent();
  if(!isContent){ done(); return; }
  setTool('reset'); setStatus('analysiert die Frage …',true);
  agentTimers.push(setTimeout(()=>{ setStatus('ruft Wissensbasis ab …',true); setTool('kb','active'); },600));
  agentTimers.push(setTimeout(()=>{ setTool('kb','done'); setStatus('erstellt Diagramm …',true); setTool('viz','active'); animateViz(); },1400));
  agentTimers.push(setTimeout(()=>{ setTool('viz','done'); setStatus(audioOn?'spricht …':'erklärt …',true); if(audioOn)setTool('voice','active'); done(); },2200));
}
function agentSpeakingDone(){ setTool('voice','done'); setStatus('fertig · bereit für den nächsten Schritt',false); }

/* ---- ADA bot markup ---- */
function botHTML(withStatus){
  return `<div class="bot" id="bot"><div class="halo"></div>
    <svg class="adasvg" viewBox="0 0 200 212" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs><radialGradient id="adaBody" cx="36%" cy="28%" r="78%">
        <stop offset="0%" stop-color="#2b3441"/><stop offset="55%" stop-color="#161c25"/><stop offset="100%" stop-color="#0c1118"/>
      </radialGradient></defs>
      <line class="ant" x1="100" y1="46" x2="100" y2="26"/>
      <circle class="anttip" cx="100" cy="20" r="6"/>
      <circle class="body" cx="100" cy="120" r="74"/>
      <circle class="cheek" cx="66" cy="134" r="12"/><circle class="cheek" cx="134" cy="134" r="12"/>
      <ellipse class="eye l" cx="77" cy="106" rx="8.5" ry="12.5"/>
      <ellipse class="eye r" cx="123" cy="106" rx="8.5" ry="12.5"/>
      <g class="mouth">
        <rect class="bar b1" x="74" y="134" width="7" height="26" rx="3.5"/>
        <rect class="bar b2" x="85" y="134" width="7" height="26" rx="3.5"/>
        <rect class="bar b3" x="96.5" y="134" width="7" height="26" rx="3.5"/>
        <rect class="bar b4" x="108" y="134" width="7" height="26" rx="3.5"/>
        <rect class="bar b5" x="119" y="134" width="7" height="26" rx="3.5"/>
      </g>
    </svg>
    ${withStatus?`<div class="agentstatus">
      <div class="statusrow idle" id="statusrow"><span class="spin"></span><span id="statustext">bereit</span></div>
      <div class="toolchips" id="toolchips">
        <span class="toolchip" data-tool="kb">📚 Wissensbasis</span>
        <span class="toolchip" data-tool="viz">📊 Diagramm</span>
        <span class="toolchip" data-tool="voice">🔊 Sprache</span>
      </div></div>`:''}
    </div>`;
}

/* ---- render ---- */
function render(){
  const s=SLIDES[idx]; let html='';
  if(s.kind==='cover'){
    html=`<div class="slide active cover">${botHTML(false)}
      <div class="kicker">${s.kicker}</div><h1>${s.title}</h1><div class="sub">${s.sub}</div>
      <div class="speech"><span class="label"><span class="spk"></span>ADA</span><span class="txt" id="txt"></span><span class="cursor" id="cur"></span></div></div>`;
  } else if(s.kind==='section'){
    const chap=CHAPTERS.find(c=>c.id===s.chapter);
    const map=CHAPTERS.filter(c=>!['start','ende'].includes(c.id)).map(c=>`<span class="${c.id===s.chapter?'on':''}">${c.name}</span>`).join('');
    html=`<div class="slide active section">
      <div class="secnum">${s.secnum}</div><h1>${s.title}</h1><div class="secsub">${s.secsub}</div>
      <div class="secmap">${map}</div>
      <div class="speech" style="max-width:640px"><span class="label"><span class="spk"></span>ADA</span><span class="txt" id="txt"></span><span class="cursor" id="cur"></span></div></div>`;
  } else if(s.kind==='sources'){
    html=`<div class="slide active" style="justify-content:center;gap:8px">
      <div class="eyebrow">Transparenz · Quellen</div>
      <h2 style="font-family:'Fraunces',serif;font-weight:600;font-size:clamp(26px,3.6vw,48px);margin:4px 0 10px">${s.title}</h2>
      <div class="speech" style="max-width:900px;margin-bottom:14px"><span class="label"><span class="spk"></span>ADA</span><span class="txt" id="txt"></span><span class="cursor" id="cur"></span></div>
      <div class="srcwrap"><div class="srcgrid">${s.items.map(it=>`<div class="srcitem"><b>${it[0]}</b> <span>${it[1]}</span></div>`).join('')}</div></div></div>`;
  } else {
    const steps = s.dim ? `<div class="dimsteps">${DIMS.map((d,i)=>`<span class="dimstep${i+1===s.dim?' on':''}">${i+1} ${d}</span>`).join('')}</div>` : '';
    html=`<div class="slide active content">
      <div class="botcol">${botHTML(true)}<div class="botname">ADA</div>
        <div class="speech"><span class="label"><span class="spk"></span>ADA erklärt</span><span class="txt" id="txt"></span><span class="cursor" id="cur"></span></div></div>
      <div class="maincol">
        <div class="eyebrow">${s.eyebrow}</div><h2>${s.title}</h2>${steps}
        <div class="viz">${s.viz}</div>
        ${s.source?`<div class="source">${s.source}</div>`:''}
      </div></div>`;
  }
  main.innerHTML=html;

  // progress + chapter label
  ticks.forEach((t,i)=>{t.className='tick'+(i<idx?' done':'')+(i===idx?' cur':'');});
  const chap=CHAPTERS.find(c=>c.id===s.chapter);
  const chapNum=CHAPTERS.filter(c=>!['start','ende'].includes(c.id)).findIndex(c=>c.id===s.chapter);
  chapterlabelEl.innerHTML = chap ? (chapNum>=0?`<span class="num">Kapitel ${chapNum+1} ·</span> ${chap.name}`:`${chap.name}`) : '';
  counterEl.textContent=String(idx+1).padStart(2,'0')+' / '+String(SLIDES.length).padStart(2,'0');
  prevBtn.style.visibility=idx===0?'hidden':'visible';
  nextBtn.textContent=idx===SLIDES.length-1?'Neustart ↺':'Weiter →';

  const say=s.say||'';
  const isContent=(s.kind==='content');
  const txtEl=document.getElementById('txt'); const curEl=document.getElementById('cur');
  if(txtEl)txtEl.innerHTML=''; if(curEl)curEl.classList.add('hidden');
  runAgentSequence(isContent, ()=>{
    if(audioOn){ if(txtEl)txtEl.innerHTML=say; document.getElementById('cur')?.classList.add('hidden'); speak(say); }
    else { typeWriter(say); }
  });
}

function typeWriter(raw){
  const txt=document.getElementById('txt'); const cur=document.getElementById('cur'); const bot=document.getElementById('bot');
  if(!txt)return;
  clearInterval(typeTimer); typing=true; cur.classList.remove('hidden'); if(bot)bot.classList.add('talking');
  let i=0; const len=raw.length;
  typeTimer=setInterval(()=>{
    if(raw[i]==='<'){const c=raw.indexOf('>',i);i=c+1;} else {i++;}
    txt.innerHTML=raw.slice(0,i);
    if(i>=len){clearInterval(typeTimer);txt.innerHTML=raw;typing=false;cur.classList.add('hidden');if(bot)bot.classList.remove('talking');agentSpeakingDone();}
  },16);
  txt._finish=()=>{clearInterval(typeTimer);txt.innerHTML=raw;typing=false;cur.classList.add('hidden');if(bot)bot.classList.remove('talking');agentSpeakingDone();};
}
function next(){
  const txt=document.getElementById('txt');
  if(!audioOn && typing && txt && txt._finish){ txt._finish(); return; }
  clearAgent(); stopSpeak(); idx=idx>=SLIDES.length-1?0:idx+1; render();
}
function prev(){ clearAgent(); stopSpeak(); if(idx>0){idx--;render();} }
nextBtn.onclick=next; prevBtn.onclick=prev;
replayBtn.onclick=()=>{ if(!audioOn){audioOn=true;updateAudioBtn();} speak(SLIDES[idx].say||''); };
audioBtn.onclick=()=>{ audioOn=!audioOn; updateAudioBtn(); if(audioOn){const s=SLIDES[idx];const txt=document.getElementById('txt');if(txt)txt.innerHTML=s.say||'';document.getElementById('cur')?.classList.add('hidden');speak(s.say||'');} else {stopSpeak();} };
function updateAudioBtn(){ audioBtn.classList.toggle('on',audioOn); audioBtn.textContent=audioOn?'🔊 Vorlesen: an':'🔈 Vorlesen: aus'; }
function toggleFs(){ if(!document.fullscreenElement)document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.(); }
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){toggleOverlay(false);return;}
  if(e.key==='f'||e.key==='F'){toggleFs();return;}
  if(e.key===' '||e.key==='ArrowRight'||e.key==='Enter'){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'){e.preventDefault();prev();}
});
window.addEventListener('beforeunload',stopSpeak);

/* ---- neural background ---- */
const cv=document.getElementById('net');const ctx=cv.getContext('2d');let W,H,nodes;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;const n=Math.min(50,Math.floor(W*H/32000));
  nodes=Array.from({length:n},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.28,vy:(Math.random()-.5)*.28}));}
resize();addEventListener('resize',resize);
function tick(){ctx.clearRect(0,0,W,H);
  for(const p of nodes){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;}
  for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const a=nodes[i],b=nodes[j];const dx=a.x-b.x,dy=a.y-b.y;const d=Math.hypot(dx,dy);
    if(d<150){ctx.strokeStyle='rgba(94,234,212,'+(.14*(1-d/150))+')';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}
  for(const p of nodes){ctx.fillStyle='rgba(255,178,77,.55)';ctx.beginPath();ctx.arc(p.x,p.y,1.7,0,7);ctx.fill();}
  requestAnimationFrame(tick);}
tick();
updateAudioBtn(); render();
</script>
